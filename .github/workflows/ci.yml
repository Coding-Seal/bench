name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev

      - run: uv run ruff check src/ tests/ main.py

      - run: uv run ruff format --check src/ tests/ main.py

      - run: uv run pytest tests/ -v
